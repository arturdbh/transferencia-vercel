<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datos de transferencia | A3 Store</title>

  <meta property="og:image" content="https://transferencia-vercel.vercel.app/og-image.png?v=1" />
  <meta property="og:url" content="https://transferencia-vercel.vercel.app" />

  <style>
    :root {
      --bg: #09090f;
      --text: #fff;
      --muted: rgba(255,255,255,0.7);
      --grad: linear-gradient(135deg,#53d8ff,#6a24ff,#ff2fb3,#ff9d00);
    }

    body {
      margin:0;
      font-family: Inter, sans-serif;
      background: radial-gradient(circle at top,#13141d,#09090f);
      color:var(--text);
    }

    .wrap {padding:20px;max-width:600px;margin:auto}

    .logo {
      width:140px;
      height:140px;
      margin:auto;
      opacity:0;
      animation: logoReveal 1.2s ease forwards;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:contain
    }

    h1{
      text-align:center;
      font-size:30px;
      margin-bottom:20px;
      animation: fadeIn 1.2s ease;
    }

    .wallet{display:flex;flex-direction:column;gap:18px}

    .card{
      padding:24px;
      border-radius:26px;
      background:linear-gradient(135deg,#111,#1a1d2e);
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      position:relative;
      overflow:hidden;
      animation: slideUp .8s ease;
    }

    .card.primary{
      box-shadow:0 0 50px rgba(83,216,255,.45);
    }

    .card::after{
      content:"";
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:linear-gradient(120deg,transparent,rgba(255,255,255,.15),transparent);
      animation: shine 5s infinite;
    }

    .card-head{display:flex;justify-content:space-between;align-items:center}

    .brand-mark{width:60px;height:60px}
    .brand-mark.primary{width:80px;height:80px}

    .brand-mark img{width:100%;height:100%;object-fit:contain}

    .bank-title{font-weight:bold;font-size:18px}

    .card-number{
      font-family:monospace;
      margin:16px 0;
      letter-spacing:2px;
    }

    .field{margin-bottom:12px}

    .value-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .copy-btn{
      background:#222;
      color:#fff;
      border:none;
      padding:8px 12px;
      border-radius:10px;
      cursor:pointer;
      transition:.2s;
    }

    .copy-btn:hover{background:#333}

    .copy-btn.copied{
      background:#53d8ff;
      color:#000;
    }

    .footer{text-align:center;margin-top:20px;color:var(--muted)}

    @keyframes shine{
      0%{left:-100%}
      50%{left:120%}
      100%{left:120%}
    }

    @keyframes slideUp{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }

    @keyframes fadeIn{
      from{opacity:0}
      to{opacity:1}
    }

    @keyframes logoReveal{
      0%{
        opacity:0;
        transform: scale(0.8) translateY(10px);
        filter: blur(10px);
      }
      100%{
        opacity:1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }
      to{opacity:1}
    }

  </style>
</head>
<body>

<div class="wrap">

<div class="logo"><img src="logo.png"></div>
<h1>Transferencia</h1>

<div class="wallet">

<div class="card primary">
  <div class="card-head">
    <div>
      <div class="bank-title">Banco Azteca</div>
      <div>Principal</div>
    </div>
    <div class="brand-mark primary"><img src="logo.png"></div>
  </div>

  <div class="card-number">1271 8001 3548 2415 77</div>

  <div class="field">
    Beneficiario
    <div class="value-row">
      Arturo Del Barrio Hernandez
      <button class="copy-btn" data-copy="Arturo Del Barrio Hernandez">Copiar</button>
    </div>
  </div>

  <div class="field">
    CLABE
    <div class="value-row">
      127180013548241577
      <button class="copy-btn" data-copy="127180013548241577">Copiar</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head">
    <div>
      <div class="bank-title">BBVA</div>
      <div>Alternativa</div>
    </div>
    <div class="brand-mark"><img src="logo.png"></div>
  </div>

  <div class="card-number">0121 8001 5188 5802 22</div>

  <div class="field">
    Beneficiario
    <div class="value-row">
      Arturo Del Barrio Hernandez
      <button class="copy-btn" data-copy="Arturo Del Barrio Hernandez">Copiar</button>
    </div>
  </div>

  <div class="field">
    CLABE
    <div class="value-row">
      012180015188580222
      <button class="copy-btn" data-copy="012180015188580222">Copiar</button>
    </div>
  </div>
</div>

</div>

<div class="footer">ADBA Diseño 2026</div>

</div>

<script>
document.querySelectorAll('.copy-btn').forEach(btn=>{
 btn.addEventListener('click', async ()=>{
   try{
     await navigator.clipboard.writeText(btn.dataset.copy);
     btn.textContent='Copiado';
     btn.classList.add('copied');
     setTimeout(()=>{
       btn.textContent='Copiar';
       btn.classList.remove('copied');
     },1200);
   }catch(e){
     alert(btn.dataset.copy);
   }
 });
});
</script>

</body>
</html>
